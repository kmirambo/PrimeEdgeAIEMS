<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Dashboard</title>
    <script src="login.js" defer></script>
    <script src="dashboard.js" defer></script>
    <script src="reccee.js" defer></script>
    <script src="events.js" defer></script>
    <script src="requisitions.js" defer></script>
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <nav>
            <ul>
                <li><a href="#login">Login</a></li>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#reccee">Reccee</a></li>
                <li><a href="#events">Events</a></li>
                <li><a href="#requisitions">Requisitions</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="login">
            <h2>Login</h2>
            <form>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <br>
                <button type="submit">Login</button>
            </form>
        </section>
        <section id="dashboard">
            <h2>Dashboard</h2>
            <p>Welcome to the admin dashboard.</p>
            <!-- Additional dashboard content -->
        </section>
        <section id="reccee">
            <h2>Reccee</h2>
            <p>Reccee section content.</p>
        </section>
        <section id="events">
            <h2>Events</h2>
            <p>Events section content.</p>
        </section>
        <section id="requisitions">
            <h2>Requisitions</h2>
            <p>Requisitions section content.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 PrimeEdge AI EMS. All Rights Reserved.</p>
    </footer>
</body>
</html>
